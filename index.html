function parseSP(t){if(!t.trim())return[];const lines=t.split('\n'),sc=[];let cur=null,dc=null;for(const raw of lines){const tr=raw.trim();if(!tr){dc=null;continue}const sm=tr.match(/^(INT\.|EXT\.|INT\/EXT\.)\s*(.+?)(?:\s*[-\u2013\u2014]\s*(.+))?$/i);if(sm){if(cur)sc.push(cur);cur={id:uid(),num:sc.length+1,ie:sm[1].toUpperCase().replace('.',''),loc:sm[2].trim(),time:(sm[3]||'DAY').trim().toUpperCase(),chars:[],dial:[],acts:[],beats:0,mood:'',sugShots:0};dc=null;continue}if(!cur)cur={id:uid(),num:1,ie:'INT',loc:'UNKNOWN',time:'DAY',chars:[],dial:[],acts:[],beats:0,mood:'',sugShots:0};const cm=tr.match(/^([A-Z][A-Z\s.''-]{1,30})(\s*\(.*\))?$/);if(cm&&tr===tr.toUpperCase()&&tr.length>1&&!/^(CUT|FADE|DISSOLVE|THE |A |AN )/.test(tr)){const cn=cm[1].trim();if(!cur.chars.includes(cn))cur.chars.push(cn);dc=cn;continue}if(/^\(.*\)$/.test(tr))continue;if(dc&&(raw.startsWith('    ')||raw.startsWith('\t'))){cur.dial.push({c:dc,t:tr});cur.beats++;continue}dc=null;cur.acts.push(tr);cur.beats++}if(cur)sc.push(cur);sc.forEach(s=>{const a=s.acts.join(' ').toLowerCase();s.mood=/anger|fight|gun|chase/i.test(a)?'Action':/cry|love|kiss|heart/i.test(a)?'Emotional':/laugh|joke|funny/i.test(a)?'Comedy':/dark|fear|blood|kill/i.test(a)?'Thriller':/quiet|calm|still/i.test(a)?'Contemplative':'Drama';s.sugShots=Math.max(3,Math.min(12,Math.ceil(s.beats*1.2)+s.chars.length))});return sc}

function charAnchor(c){let a=`[CHARACTER: ${c.token} \u2014 ${c.age?c.age+'yo ':''} ${c.ethnicity||''} ${c.gender?c.gender.toLowerCase():''}, ${c.height||''} ${c.build?c.build.toLowerCase():''} build.`;if(c.faceShape||c.jawline||c.eyeDetails)a+=`\nFACE: ${c.faceShape||''} face, ${c.jawline||''} jawline, ${c.cheekbones||''} cheekbones, ${c.eyeDetails||c.eyeShape+' eyes'||''}, ${c.noseShape||''} nose, ${c.lipShape||''} lips, ${c.facialHair||''}.`;if(c.hairStyle||c.hairColor)a+=`\nHAIR: ${c.hairStyle||''} ${c.hairColor||''} hair${c.hairLength?', '+c.hairLength:''}.`;if(c.skinDetails)a+=`\nSKIN: ${c.skinDetails}.`;if(c.markers)a+=`\nMARKERS: ${c.markers}.`;if(c.outfit||c.acc||c.shoes)a+=`\nWEARING: ${c.outfit||'casual'}${c.acc?', '+c.acc:''}${c.shoes?', '+c.shoes:''}.`;if(c.descPrompt)a+=`\nDESCRIPTION: ${c.descPrompt}`;a+=`\nID: ${c.token}]`;return a}

function lightBlock(){const p=LPRESETS.find(x=>x.id===S.lpreset),td=TODS.find(x=>x.id===S.tod);return p?`[LIGHTING: ${p.s}, ${td?.l||''} ${td?.t||''}]`:'[LIGHTING: Custom]'}
function styleBlock(){const p=FPRESETS.find(x=>x.id===S.fpreset),fs=FSTOCKS.find(x=>x.id===S.fstock);return`[STYLE: ${p?p.n+' \u2014 '+p.s:'Cinematic'}, ${fs?.n||'Digital'}, ${S.cgrade}, ${S.contrast} contrast, ${S.sat}]`}

async function generate(){if(!S.screenplay.trim()){toast('Upload screenplay first!','error');return}const prov=PROVIDERS.find(p=>p.id===S.prov);if(!prov){toast('Select AI provider','error');return}const key=S.keys[prov.id];if(!key){toast('Enter API key for '+prov.name,'error');return}const model=S.model||prov.models[0];
let sys=`You are an expert cinematographer, lighting director, and visual storytelling master. Your job is to analyze a screenplay and generate shot-by-shot cinematic image prompts.

FOR EACH SCENE, generate shots with full cinematic detail. For EACH shot YOU decide EVERYTHING:
- Camera angle, shot size, lens, camera movement based on scene emotion/action/pacing
- For action scenes: use dynamic angles (low angle, dutch, tracking shots, wide lenses like 24mm)
- For dialogue: use shot-reverse-shot, OTS, medium shots, 50-85mm lenses
- For emotional moments: use close-ups, shallow DOF, 85-135mm lenses
- For establishing: use wide/extreme wide shots, 14-24mm lenses
- For tension: use dutch angles, tight framing, handheld movement
- For power dynamics: low angle for powerful character, high angle for vulnerable
- Vary your shot choices naturally. DON'T repeat the same angle/size for consecutive shots.

LIGHTING — YOU DECIDE automatically based on scene:
- INT scenes: choose appropriate indoor lighting (practicals, window light, overhead, lamps)
- EXT DAY: golden hour, harsh noon, overcast, morning light — whatever fits mood
- EXT NIGHT: moonlight, streetlights, neon, car headlights
- Emotional scenes: warm soft key light, shallow shadows
- Thriller/tension: hard shadows, noir, single source, underlit
- Romance: golden hour backlight, soft glow, warm tones
- Action: harsh dynamic lighting, mixed color temps
- Include specific color temperatures (2700K-7500K), light directions, shadow quality

VISUAL STYLE — YOU DECIDE automatically based on screenplay tone:
- Choose the best film look (Nolan-esque, Villeneuve atmosphere, Fincher dark, etc.)
- Choose color grading (teal-orange, desaturated, warm vintage, etc.)
- Choose film stock emulation (Kodak Vision3, Fujifilm Eterna, 35mm grain, clean digital)
- Embed ALL style info directly into each image prompt
- Keep style CONSISTENT across all shots in same scene

CAMERA OPTIONS you can pick from:
Shot Sizes: EWS, WS, MWS, MS, MCU, CU, ECU, OTS, POV, Two-Shot, Group Shot, Insert, Aerial
Angles: Eye Level, Low Angle, High Angle, Dutch/Tilt, Bird's Eye, Worm's Eye, Over-Shoulder
Lenses: 14mm, 24mm, 35mm, 50mm, 85mm, 100-135mm, 200mm+
Movement: Static, Pan, Tilt, Dolly, Truck/Track, Crane, Steadicam, Handheld, Zoom, Whip Pan, Orbital
DOF: Shallow (f/1.4-2.8), Medium (f/4-5.6), Deep (f/8-16)`;

if(S.chars.length){sys+='\n\nCHARACTERS (inject these descriptions into EVERY prompt where they appear):\n';S.chars.forEach(c=>{sys+=charAnchor(c)+'\n\n'})}
if(S.refp)sys+='\nREFERENCE STYLE PROMPTS (match this style):\n'+S.refp;sys+='\nPACING: '+(PACES.find(p=>p.id===S.dpace)?.l||'Medium')+' \u2014 '+(PACES.find(p=>p.id===S.dpace)?.d||'');
sys+=`\n\nReturn ONLY valid JSON array. Format:
[{
  "sceneNumber": 1,
  "sceneTitle": "INT. COFFEE SHOP - MORNING",
  "shots": [{
    "shotNumber": 1,
    "shotType": "Wide Shot",
    "cameraAngle": "Eye Level",
    "lens": "24mm f/2.8",
    "cameraMovement": "Slow Dolly In",
    "dof": "Deep",
    "description": "Short description",
    "imagePrompt": "Full 200+ word cinematic prompt with ALL character details, camera, lighting, style baked in",
    "characters": ["ARJUN"],
    "transition": "Cut"
  }]
}]
CRITICAL: Each imagePrompt must be 200+ words, self-contained, with full character descriptions, camera/lens info, lighting, and style all embedded directly in the prompt text. No JSON tags in the prompt. Make it a flowing cinematic description.
No markdown wrapping. Pure JSON only.`;

const maxChars=prov.id==='groq'?12000:prov.id==='fireworks'?15000:prov.id==='together'?20000:prov.id==='cohere'?15000:40000;let spText=S.screenplay;if(spText.length>maxChars){spText=spText.slice(0,maxChars)+'\n\n[TRUNCATED - generate shots for above portion only]'}let user='SCREENPLAY:\n'+spText;
S.gen=true;S.prog=10;R();
try{let url=prov.url.replace('{model}',model),h={'Content-Type':'application/json'},b;
if(prov.at==='param'){url+='?key='+key;b=JSON.stringify({system_instruction:{parts:[{text:sys}]},contents:[{parts:[{text:user}]}],generationConfig:{temperature:0.7,maxOutputTokens:65536}})}
else if(prov.at==='anthropic'){h['x-api-key']=key;h['anthropic-version']='2023-06-01';h['anthropic-dangerous-direct-browser-access']='true';b=JSON.stringify({model,max_tokens:8192,system:sys,messages:[{role:'user',content:user}]})}
else{h['Authorization']='Bearer '+key;const mt=prov.id==='deepseek'?8192:prov.id==='groq'?8000:prov.id==='mistral'?8192:prov.id==='cohere'?4096:prov.id==='fireworks'?8192:prov.id==='together'?8192:prov.id==='xai'?16384:prov.id==='perplexity'?8192:prov.id==='openrouter'?8192:16384;b=JSON.stringify({model,messages:[{role:'system',content:sys},{role:'user',content:user}],max_tokens:mt,temperature:0.7})}
S.prog=30;R();const resp=await fetch(url,{method:'POST',headers:h,body:b,signal:AbortSignal.timeout(180000)});S.prog=70;R();
if(!resp.ok){const et=await resp.text().catch(()=>'');throw new Error('API Error '+resp.status+': '+(et.slice(0,100)))}
const data=await resp.json();let txt='';
if(prov.at==='param')txt=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
else if(prov.at==='anthropic')txt=data.content?.[0]?.text||'';
else txt=data.choices?.[0]?.message?.content||'';
txt=txt.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
const js=txt.indexOf('['),je=txt.lastIndexOf(']')+1;
if(js===-1||je<=js)throw new Error('No valid JSON in AI response');
S.gscenes=JSON.parse(txt.slice(js,je));
S.prog=100;R();setTimeout(()=>{S.gen=false;S.prog=0;S.tab='storyboard';R()},600);
toast('\u2705 Generated '+S.gscenes.reduce((a,s)=>a+(s.shots?.length||0),0)+' shots!','success')
}catch(e){S.gen=false;S.prog=0;R();toast('\u274C '+e.message,'error')}}

function dl(c,f,m){const b=new Blob([c],{type:m}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=f;a.click();URL.revokeObjectURL(u)}
function cpClip(t){navigator.clipboard.writeText(t).then(()=>toast('Copied!','success')).catch(()=>toast('Copy failed','error'))}
function expTxt(){let t=`CinePrompt Studio v2.0\nProject: ${S.pname}\n${'='.repeat(50)}\n`;S.gscenes.forEach(sc=>{t+=`\nSCENE ${sc.sceneNumber}: ${sc.sceneTitle}\n${'-'.repeat(40)}\n`;(sc.shots||[]).forEach(sh=>{t+=`\nShot ${sh.shotNumber} | ${sh.shotType||''} | ${sh.cameraAngle||''} | ${sh.lens||''}\n${sh.description||''}\n\nPROMPT:\n${sh.imagePrompt}\n`})});dl(t,S.pname.replace(/\s/g,'_')+'_prompts.txt','text/plain')}

function expCsv(){let c='Scene,Shot,Type,Angle,Lens,Movement,Description,Prompt\n';S.gscenes.forEach(sc=>(sc.shots||[]).forEach(sh=>{c+=`"${sc.sceneTitle||''}","${sh.shotNumber}","${sh.shotType||''}","${sh.cameraAngle||''}","${sh.lens||''}","${sh.cameraMovement||''}","${(sh.description||'').replace(/"/g,'""')}","${(sh.imagePrompt||'').replace(/"/g,'""')}"\n`}));dl(c,S.pname.replace(/\s/g,'_')+'.csv','text/csv')}

function expProj(){dl(JSON.stringify({v:'2.0',n:S.pname,sp:S.screenplay,chars:S.chars,scenes:S.scenes,gscenes:S.gscenes,pf:S.pfmt,dt:S.dtrans,dp:S.dpace,ref:S.refp,keys:S.keys,prov:S.prov,model:S.model},null,2),S.pname.replace(/\s/g,'_')+'_project.json','application/json')}

function cpAll(){let a='';S.gscenes.forEach(sc=>(sc.shots||[]).forEach(sh=>{a+=sh.imagePrompt+'\n\n---\n\n'}));cpClip(a)}

const hdrs={screenplay:'\u{1F4DC} Screenplay Upload & Parser',characters:'\u{1F464} Characters',generate:'\u26A1 Generate Shot Prompts',storyboard:'\u{1F4CB} Storyboard View',continuity:'\u{1F517} Continuity Tracker',providers:'\u{1F916} AI Provider Settings','export':'\u{1F4E4} Export Center',project:'\u{1F4BE} Project Management'};

function renderApp(){return`<div class="app">${renderSB()}<div class="ma"><div class="mh"><h2>${hdrs[S.tab]||''}</h2><div style="display:flex;align-items:center;gap:8px">${S.gen?`<div class="pbar" style="width:100px"><div class="pfill" style="width:${S.prog}%"></div></div><span style="font-size:11px;color:var(--acc)">Generating...</span>`:''}<span style="font-size:11px;color:var(--t3)">${esc(S.pname)}</span></div></div><div class="mc">${renderTab()}</div></div>${S.modal?renderModal():''}${renderToasts()}</div>`}

function tabSP(){return`<div class="gc" style="margin-bottom:16px"><div class="ch"><h3>\u{1F4C4} Upload or Paste Screenplay</h3><div style="display:flex;gap:6px"><label class="btn bs bsm" style="cursor:pointer"><input type="file" accept=".txt,.md,.fountain" style="display:none" onchange="hFile(event)">\u{1F4C1} Upload File</label>${S.screenplay?`<button class="btn bs bsm" onclick="S.scenes=parseSP(S.screenplay);toast('Parsed '+S.scenes.length+' scenes!','success');R()">\u{1F50D} Re-Parse</button><button class="btn bd bsm" onclick="S.screenplay='';S.scenes=[];R()">\u2715 Clear</button>`:''}</div></div><div class="cb"><textarea class="ta" style="min-height:200px;font-family:var(--fm);font-size:11px;line-height:1.6" placeholder="Paste your screenplay here...\n\nStandard format:\n\nINT. COFFEE SHOP - MORNING\n\nArjun enters the shop, looking nervous.\n\nARJUN\nHey, can we talk?\n\nPRIYA\nSure, sit down." oninput="S.screenplay=this.value" onblur="if(S.screenplay&&!S.scenes.length){S.scenes=parseSP(S.screenplay);R()}">${esc(S.screenplay)}</textarea>${S.spFile?`<div style="margin-top:6px;font-size:11px;color:var(--t3)">\u{1F4C4} ${esc(S.spFile)}</div>`:''}</div></div>${S.scenes.length?`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="font-size:15px">\u{1F4CB} Parsed: ${S.scenes.length} Scenes</h3><div style="display:flex;gap:6px"><span class="chip cg">~${S.scenes.reduce((a,s)=>a+s.sugShots,0)} Shots</span><span class="chip cbl">${S.scenes.reduce((a,s)=>a+s.beats,0)} Beats</span></div></div>${S.scenes.map(sc=>`<div class="bdc"><div class="bdch"><span class="scn">SC ${sc.num}</span><span class="chip ${sc.ie.includes('INT')?'cbl':'cg'}">${esc(sc.ie)}</span><span style="font-weight:600;font-size:12px">${esc(sc.loc)}</span><span class="chip ca">${esc(sc.time)}</span><span style="margin-left:auto;font-size:11px;color:var(--t3)">${sc.sugShots} shots</span></div><div class="bdcb"><div class="bdcm">${sc.chars.map(c=>`<span class="chip cp">\u{1F464} ${esc(c)}</span>`).join('')}${sc.mood?`<span class="chip cc">\u{1F3AD} ${esc(sc.mood)}</span>`:''}</div>${sc.acts.length?`<div style="margin-top:6px;font-size:11px;color:var(--t3);font-style:italic;max-height:40px;overflow:hidden">${esc(sc.acts.slice(0,2).join(' '))}</div>`:''}</div></div>`).join('')}`:`<div class="es"><div class="ei">\u{1F4DC}</div><h3>No screenplay loaded</h3><p>Upload a .txt or .md file, or paste screenplay text above.</p></div>`}`}

function tabSt(){return`<div class="gc" style="margin-bottom:14px"><div class="ch"><h3>\u{1F3AC} Film Look Presets</h3><div style="display:flex;align-items:center;gap:6px"><span style="font-size:10px;color:var(--t3)">Lock to all shots</span><div class="tgl ${S.slock?'on':''}" onclick="S.slock=!S.slock;R()"></div></div></div><div class="cb"><div class="pg">${FPRESETS.map(p=>`<div class="pc ${S.fpreset===p.id?'sel':''}" onclick="S.fpreset='${p.id}';R()"><div class="pe">${p.e}</div><div class="pn">${p.n}</div><div class="pd">${p.d}</div></div>`).join('')}</div></div></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px"><div class="gc"><div class="ch"><h3>\u{1F3A8} Color Grading</h3></div><div class="cb"><div class="fg"><label class="lbl">Grade</label><select class="sel" onchange="S.cgrade=this.value">${['teal-orange','desaturated','high-saturation','monochrome','warm-vintage','cool-blue'].map(v=>`<option ${S.cgrade===v?'selected':''}>${v}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Contrast</label><select class="sel" onchange="S.contrast=this.value">${['high','medium','low'].map(v=>`<option ${S.contrast===v?'selected':''}>${v}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Saturation</label><select class="sel" onchange="S.sat=this.value">${['vivid','muted','desaturated'].map(v=>`<option ${S.sat===v?'selected':''}>${v}</option>`).join('')}</select></div></div></div>
<div class="gc"><div class="ch"><h3>\u{1F39E} Film Stock</h3></div><div class="cb">${FSTOCKS.map(f=>`<div class="vo ${S.fstock===f.id?'sel':''}" style="margin-bottom:3px;text-align:left" onclick="S.fstock='${f.id}';R()"><div class="vl">${f.n}</div></div>`).join('')}</div></div></div>
<div class="gc" style="margin-bottom:14px"><div class="ch"><h3>\u{1F4DD} Reference Prompts</h3></div><div class="cb"><textarea class="ta" placeholder="Paste example image prompts whose style you want to match..." oninput="S.refp=this.value">${esc(S.refp)}</textarea></div></div>
<div class="gc"><div class="ch"><h3>\u{1F441} Style Preview</h3><button class="btn bs bsm" onclick="cpClip(styleBlock())">\u{1F4CB} Copy</button></div><div class="cb"><pre style="font-family:var(--fm);font-size:10px;color:var(--pur);white-space:pre-wrap;background:var(--purd);padding:10px;border-radius:6px">${esc(styleBlock())}</pre></div></div>`}

function tabGen(){const pv=PROVIDERS.find(p=>p.id===S.prov);const ck=[{l:'Screenplay',ok:!!S.screenplay},{l:'Characters',ok:S.chars.length>0},{l:'Scenes Parsed',ok:S.scenes.length>0},{l:'AI Provider',ok:!!pv},{l:'API Key',ok:!!S.keys[S.prov]}];
return`<div class="ai-note">\u{1F3AC} <div><strong>Full AI Cinematography:</strong> The AI automatically decides <strong>camera angles, lenses, lighting, color grading, and visual style</strong> for each shot based on the screenplay\u2019s mood, action, and pacing. You focus on story \u2014 AI handles everything!</div></div>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px">${ck.map(c=>`<div style="padding:10px;text-align:center;background:${c.ok?'var(--grnd)':'var(--redd)'};border:1px solid ${c.ok?'rgba(52,211,153,.2)':'rgba(255,84,89,.2)'};border-radius:8px"><div style="font-size:16px;margin-bottom:2px">${c.ok?'\u2705':'\u274C'}</div><div style="font-size:10px;font-weight:600;color:${c.ok?'var(--grn)':'var(--red)'}">${c.l}</div></div>`).join('')}</div>
<div class="gc" style="margin-bottom:16px"><div class="ch"><h3>\u2699 Generation Settings</h3></div><div class="cb"><div class="fr fr3"><div class="fg"><label class="lbl">AI Provider</label><select class="sel" onchange="S.prov=this.value;S.model=PROVIDERS.find(p=>p.id===this.value)?.models[0]||'';R()">${PROVIDERS.map(p=>`<option value="${p.id}" ${S.prov===p.id?'selected':''}>${p.name}${S.keys[p.id]?' \u2713':''}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Model</label><select class="sel" onchange="S.model=this.value">${(pv?.models||[]).map(m=>`<option value="${m}" ${(S.model||pv?.models[0])===m?'selected':''}>${m.split('/').pop()}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Pacing</label><select class="sel" onchange="S.dpace=this.value">${PACES.map(p=>`<option value="${p.id}" ${S.dpace===p.id?'selected':''}>${p.l} (${p.d})</option>`).join('')}</select></div></div>
<div class="fg"><label class="lbl">API Key (${esc(pv?.name||'Select provider')})</label><input class="inp" type="password" placeholder="Enter your API key..." value="${esc(S.keys[S.prov]||'')}" oninput="S.keys[S.prov]=this.value"></div></div></div>
<div style="text-align:center;padding:20px 0"><button class="btn bp" style="padding:14px 50px;font-size:16px;font-weight:700;border-radius:12px;letter-spacing:.5px" ${S.gen?'disabled':''} onclick="generate()">${S.gen?'\u23F3 AI is generating...':'\u26A1 Generate Shot Prompts'}</button>${S.gen?`<div class="pbar" style="width:280px;margin:12px auto 0;height:6px"><div class="pfill" style="width:${S.prog}%"></div></div><div style="font-size:11px;color:var(--t3);margin-top:6px">${S.prog<30?'Preparing...':S.prog<70?'AI thinking...':'Processing response...'}</div>`:''}</div>
${S.gscenes.length?`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h3 style="font-size:15px">\u2728 ${S.gscenes.length} Scenes, ${S.gscenes.reduce((a,s)=>a+(s.shots?.length||0),0)} Shots</h3><div style="display:flex;gap:6px"><button class="btn bs bsm" onclick="cpAll()">\u{1F4CB} Copy All</button><button class="btn bs bsm" onclick="expTxt()">\u{1F4C4} .txt</button></div></div>${S.gscenes.map(sc=>`<div class="sc"><div class="sch"><span class="scn">SC ${sc.sceneNumber}</span><span class="sct">${esc(sc.sceneTitle||'')}</span><span style="margin-left:auto;font-size:11px;color:var(--t3)">${sc.shots?.length||0} shots</span></div><div class="sgr">${(sc.shots||[]).map(shotCard).join('')}</div></div>`).join('')}`:''}`}

function shotCard(sh,i){return`<div class="shc"><div class="shch"><span class="sn">Shot ${sh.shotNumber||i+1}</span><div style="display:flex;gap:3px;flex-wrap:wrap">${sh.shotType?`<span class="chip ca">${esc(sh.shotType)}</span>`:''}${sh.cameraAngle?`<span class="chip cbl">${esc(sh.cameraAngle)}</span>`:''}</div></div><div class="shcb">${sh.description?`<div style="font-size:11px;font-weight:500;margin-bottom:6px;color:var(--t1)">${esc(sh.description)}</div>`:''}<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px">${sh.lens?`<span class="chip cp">\u{1F4F7} ${esc(sh.lens)}</span>`:''}${sh.cameraMovement?`<span class="chip cc">\u{1F3AC} ${esc(sh.cameraMovement)}</span>`:''}${sh.dof?`<span class="chip cg">${esc(sh.dof)} DOF</span>`:''}${sh.transition&&sh.transition.toLowerCase()!=='cut'?`<span class="chip cw">\u{1F504} ${esc(sh.transition)}</span>`:''}</div>${sh.characters?.length?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px">${sh.characters.map(c=>`<span class="chip cp">\u{1F464} ${esc(c)}</span>`).join('')}</div>`:''}<div class="pt">${esc(sh.imagePrompt||'')}</div></div><div class="shca"><button class="btn bg bxs" onclick="cpClip(this.closest('.shc').querySelector('.pt').textContent)">\u{1F4CB} Copy Prompt</button></div></div>`}

function tabSBoard(){if(!S.gscenes.length)return`<div class="es"><div class="ei">\u{1F4CB}</div><h3>No shots generated yet</h3><p>Go to Generate tab first.</p></div>`;return`<div style="display:flex;justify-content:space-between;margin-bottom:14px"><div style="display:flex;gap:4px"><div class="tab ${S.sbview==='grid'?'act':''}" onclick="S.sbview='grid';R()">\u{1F4CA} Grid</div><div class="tab ${S.sbview==='timeline'?'act':''}" onclick="S.sbview='timeline';R()">\u{1F4CF} Timeline</div></div><div style="display:flex;gap:6px"><button class="btn bs bsm" onclick="cpAll()">\u{1F4CB} Copy All</button><button class="btn bs bsm" onclick="expMd()">\u{1F4DD} .md</button></div></div>${S.sbview==='grid'?S.gscenes.map(sc=>`<div style="margin-bottom:20px"><div class="sch"><span class="scn">SC ${sc.sceneNumber}</span><span class="sct">${esc(sc.sceneTitle||'')}</span></div><div class="sbg">${(sc.shots||[]).map((sh,i)=>`<div style="border:1px solid var(--brd);border-radius:8px;overflow:hidden;background:var(--bg3);transition:all .15s" onmouseenter="this.style.borderColor='var(--acc)'" onmouseleave="this.style.borderColor='var(--brd)'"><div style="padding:5px 8px;font-size:10px;font-weight:700;background:rgba(245,185,66,.08);border-bottom:1px solid var(--brd);display:flex;justify-content:space-between"><span style="color:var(--acc)">S${sh.shotNumber||i+1}</span><span style="color:var(--t3)">${esc(sh.shotType||'')}</span></div><div style="padding:6px 8px"><div style="font-size:9px;color:var(--blu);margin-bottom:2px">${esc(sh.cameraAngle||'')} \u2022 ${esc(sh.lens||'')}</div><div style="font-size:10px;color:var(--t2);line-height:1.3;max-height:50px;overflow:hidden">${esc((sh.description||sh.imagePrompt||'').slice(0,90))}...</div></div><div style="padding:4px 6px;border-top:1px solid var(--brd);display:flex;flex-wrap:wrap;gap:2px">${(sh.characters||[]).map(c=>`<span class="chip cp" style="font-size:8px">${esc(c)}</span>`).join('')}</div></div>`).join('')}</div></div>`).join(''):S.gscenes.map(sc=>`<div style="margin-bottom:20px"><div class="sch"><span class="scn">SC ${sc.sceneNumber}</span><span class="sct">${esc(sc.sceneTitle||'')}</span></div><div class="tl">${(sc.shots||[]).map((sh,i,a)=>`<div class="tls"><div style="font-size:10px;font-weight:700;color:var(--acc)">S${sh.shotNumber||i+1}</div><div style="display:flex;gap:2px;margin:2px 0"><span class="chip ca" style="font-size:8px">${esc(sh.shotType||'')}</span></div><div style="font-size:8px;color:var(--blu)">${esc(sh.cameraAngle||'')} \u2022 ${esc(sh.lens||'')}</div><div style="font-size:9px;color:var(--t3);margin-top:2px;line-height:1.2">${esc((sh.description||'').slice(0,60))}</div></div>${i<a.length-1?`<div class="tlsp">${sh.transition&&sh.transition.toLowerCase()!=='cut'?esc(sh.transition):'\u2192'}</div>`:''}`).join('')}</div></div>`).join('')}`}

function tabCo(){if(!S.gscenes.length)return`<div class="es"><div class="ei">\u{1F517}</div><h3>No shots generated</h3><p>Generate shots first to track continuity.</p></div>`;const ca={};S.gscenes.forEach(sc=>(sc.shots||[]).forEach(sh=>(sh.characters||[]).forEach(c=>{if(!ca[c])ca[c]=[];ca[c].push('SC'+sc.sceneNumber+' S'+sh.shotNumber)})));return`<div class="gc" style="margin-bottom:14px"><div class="ch"><h3>\u{1F5FA} Spatial Map (180\u00B0 Rule)</h3></div><div class="cb"><div class="spmap"><div class="sprl"></div><div class="sprll">180\u00B0 line</div><div class="spcam">\u{1F4F7}</div>${S.chars.slice(0,4).map((c,i)=>`<div class="spch" style="top:${20+i*18}%;left:${15+i*20}%">${esc(c.name)}</div>`).join('')}</div></div></div>
<div class="gc" style="margin-bottom:14px"><div class="ch"><h3>\u{1F464} Character Appearances</h3></div><div class="cb">${Object.entries(ca).map(([n,sh])=>`<div style="margin-bottom:8px;padding:8px;background:rgba(255,255,255,.02);border-radius:6px;border:1px solid var(--brd)"><div style="font-size:12px;font-weight:600;margin-bottom:4px">\u{1F464} ${esc(n)}</div><div style="display:flex;flex-wrap:wrap;gap:3px">${sh.map(s=>`<span class="chip ca">${esc(s)}</span>`).join('')}</div></div>`).join('')||'<span style="color:var(--t3)">No character data</span>'}</div></div>
<div class="gc"><div class="ch"><h3>\u{1F454} Wardrobe Tracker</h3></div><div class="cb">${S.chars.map(c=>`<div style="margin-bottom:8px;padding:8px;background:rgba(255,255,255,.02);border-radius:6px;border:1px solid var(--brd)"><div style="font-weight:600;font-size:12px">${esc(c.name)}</div><div style="font-size:11px;color:var(--t2);margin-top:2px">${esc(c.outfit||c.descPrompt?.slice(0,80)||'Not set')}</div>${c.markers?`<div class="cwarn" style="margin-top:4px">\u26A0\uFE0F ${esc(c.markers)}</div>`:''}</div>`).join('')||'<span style="color:var(--t3)">Add characters first</span>'}</div></div>`}

function tabPr(){const pv=PROVIDERS.find(p=>p.id===S.prov);return`<p style="font-size:12px;color:var(--t2);margin-bottom:14px">Keys stored in memory only \u2014 not persisted.</p><div class="provg">${PROVIDERS.map(p=>`<div class="provc ${S.prov===p.id?'sel':''}" onclick="S.prov='${p.id}';S.model=PROVIDERS.find(x=>x.id==='${p.id}').models[0];R()"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;font-weight:600">${p.name}</span>${S.keys[p.id]?'<span class="chip cg">\u2713</span>':'<span class="chip cr">No Key</span>'}</div><div style="font-size:10px;color:var(--t3);margin-top:2px">${p.models.length} models</div></div>`).join('')}</div>${pv?`<div class="gc" style="margin-top:14px"><div class="ch"><h3>\u2699 ${esc(pv.name)} Settings</h3></div><div class="cb"><div class="fg"><label class="lbl">API Key</label><input class="inp" type="password" value="${esc(S.keys[pv.id]||'')}" oninput="S.keys['${pv.id}']=this.value" placeholder="Paste API key here..."></div><div class="fg"><label class="lbl">Model</label><select class="sel" onchange="S.model=this.value">${pv.models.map(m=>`<option value="${m}" ${(S.model||pv.models[0])===m?'selected':''}>${m.split('/').pop()}</option>`).join('')}</select></div><button class="btn bs" onclick="testConn()">\u{1F517} Test Connection</button></div></div>`:''}`}

function tabEx(){const has=S.gscenes.length>0;return`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;margin-bottom:16px">${[{l:'\u{1F4C4} Text (.txt)',f:'expTxt()'},{l:'\u{1F4CB} JSON (.json)',f:'expJson()'},{l:'\u{1F4CA} CSV (.csv)',f:'expCsv()'},{l:'\u{1F4DD} Markdown (.md)',f:'expMd()'},{l:'\u{1F4CB} Copy All Prompts',f:'cpAll()'}].map(e=>`<div class="gc" style="cursor:${has?'pointer':'not-allowed'};opacity:${has?1:.4}" ${has?`onclick="${e.f}"`:''} ><div class="cb" style="text-align:center;padding:18px"><div style="font-size:13px;font-weight:600">${e.l}</div></div></div>`).join('')}</div>
<div class="gc" style="margin-bottom:14px"><div class="ch"><h3>\u{1F3AF} Prompt Format</h3></div><div class="cb"><div class="vg">${PFMTS.map(f=>`<div class="vo ${S.pfmt===f.id?'sel':''}" onclick="S.pfmt='${f.id}';R()"><div class="vl">${f.l}</div><div class="vd">${f.d}</div></div>`).join('')}</div></div></div>
<div class="gc"><div class="ch"><h3>\u{1F504} Default Transition</h3></div><div class="cb"><div class="vg">${TRANS.map(t=>`<div class="vo ${S.dtrans===t.id?'sel':''}" onclick="S.dtrans='${t.id}';R()"><div class="vl">${t.l}</div><div class="vd">${t.d}</div></div>`).join('')}</div></div></div>`}

function tabPj(){return`<div class="gc" style="margin-bottom:16px"><div class="ch"><h3>\u{1F4BE} Current Project</h3></div><div class="cb"><div class="fg"><label class="lbl">Project Name</label><input class="inp" value="${esc(S.pname)}" oninput="S.pname=this.value"></div><div style="display:flex;gap:8px"><button class="btn bp" onclick="expProj()">\u{1F4E4} Export Project</button><label class="btn bs" style="cursor:pointer"><input type="file" accept=".json" style="display:none" onchange="hImp(event)">\u{1F4E5} Import Project</label></div></div></div>
<div class="gc" style="margin-bottom:16px"><div class="ch"><h3>\u{1F4CA} Project Stats</h3></div><div class="cb"><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px">${[{l:'Screenplay',v:S.screenplay?Math.round(S.screenplay.length/1000)+'K':'Empty'},{l:'Scenes',v:S.scenes.length},{l:'Characters',v:S.chars.length},{l:'Generated Scenes',v:S.gscenes.length},{l:'Total Shots',v:S.gscenes.reduce((a,s)=>a+(s.shots?.length||0),0)}].map(s=>`<div style="text-align:center;padding:10px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--brd)"><div style="font-size:18px;font-weight:700;color:var(--acc)">${s.v}</div><div style="font-size:10px;color:var(--t3);margin-top:3px">${s.l}</div></div>`).join('')}</div></div></div>
<div class="gc"><div class="ch"><h3>\u26A0 Danger Zone</h3></div><div class="cb"><button class="btn bd" onclick="if(confirm('Reset everything? This cannot be undone.'))location.reload()">\u{1F5D1} Reset Project</button></div></div>`}

function renderModal(){if(S.modal!=='char')return'';const isN=S.editCharId==='new';const c=isN?{id:uid(),name:'',token:'',gender:'Male',age:'',ethnicity:'',height:'',build:'Average',faceShape:'Oval',jawline:'Sharp angular',cheekbones:'High prominent',eyeShape:'Almond',eyeDetails:'',noseShape:'Straight',lipShape:'Full',facialHair:'Clean-shaven',skinDetails:'',hairStyle:'Short textured',hairColor:'',hairLength:'',hairFeatures:'',outfit:'',acc:'',shoes:'',markers:'',descPrompt:''}:S.chars.find(x=>x.id===S.editCharId)||{};
return`<div class="modal-o" onclick="if(event.target===this){S.modal=null;R()}"><div class="modal"><div class="modal-h"><h3>${isN?'\u2795 New Character':'\u270F Edit: '+esc(c.name)}</h3><button class="btn bg" onclick="S.modal=null;R()">\u2715</button></div><div class="modal-b">

<div class="csec"><div class="csec-t">\u{1F464} Basic Info</div><div class="fr fr2"><div class="fg"><label class="lbl">Character Name *</label><input class="inp" id="cf_name" value="${esc(c.name)}" placeholder="e.g. Arjun, Priya"></div><div class="fg"><label class="lbl">Gender</label><select class="sel" id="cf_gender">${['Male','Female','Non-binary','Other'].map(g=>`<option ${c.gender===g?'selected':''}>${g}</option>`).join('')}</select></div></div><div class="fr fr3"><div class="fg"><label class="lbl">Age</label><input class="inp" id="cf_age" value="${esc(c.age)}" placeholder="25"></div><div class="fg"><label class="lbl">Height</label><input class="inp" id="cf_ht" value="${esc(c.height)}" placeholder="5'11"></div><div class="fg"><label class="lbl">Build</label><select class="sel" id="cf_build">${BUILDS.map(b=>`<option ${c.build===b?'selected':''}>${b}</option>`).join('')}</select></div></div><div class="fg"><label class="lbl">Ethnicity / Skin Tone</label><input class="inp" id="cf_eth" value="${esc(c.ethnicity)}" placeholder="e.g. Medium brown warm undertone, South Asian"></div></div>

<div class="csec"><div class="csec-t">\u{1F4DD} Character Description Prompt (MOST IMPORTANT)</div><div style="font-size:11px;color:var(--t3);margin-bottom:8px">Write the full visual description that will be injected into every image prompt this character appears in.</div><textarea class="ta" id="cf_desc" style="min-height:100px;font-size:12px;line-height:1.6" placeholder="Ultra-realistic 12K 3D cinematic full body shot showing ARJUN \u2014 25yo South Asian male, 5'11 athletic build, sharp angular jawline, deep-set dark brown almond eyes, short textured black hair with undercut, medium brown warm skin, wearing dark navy linen kurta with rolled sleeves, black slim jeans, brown leather watch, silver chain necklace always visible...">${esc(c.descPrompt)}</textarea></div>

<div class="csec"><div class="csec-t">\u{1F9D1} Face Details (Optional \u2014 for extra precision)</div><div class="fr fr3"><div class="fg"><label class="lbl">Face Shape</label><select class="sel" id="cf_fs">${FSHAPES.map(f=>`<option ${c.faceShape===f?'selected':''}>${f}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Jawline</label><select class="sel" id="cf_jaw">${JAWS.map(j=>`<option ${c.jawline===j?'selected':''}>${j}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Cheekbones</label><select class="sel" id="cf_chk">${CHEEKS.map(k=>`<option ${c.cheekbones===k?'selected':''}>${k}</option>`).join('')}</select></div></div><div class="fr fr3"><div class="fg"><label class="lbl">Eye Shape</label><select class="sel" id="cf_es">${ESHAPES.map(e=>`<option ${c.eyeShape===e?'selected':''}>${e}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Nose</label><select class="sel" id="cf_ns">${NSHAPES.map(n=>`<option ${c.noseShape===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Lips</label><select class="sel" id="cf_ls">${LSHAPES.map(l=>`<option ${c.lipShape===l?'selected':''}>${l}</option>`).join('')}</select></div></div><div class="fr fr2"><div class="fg"><label class="lbl">Facial Hair</label><select class="sel" id="cf_fh">${FHAIRS.map(f=>`<option ${c.facialHair===f?'selected':''}>${f}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Skin Details (scars, moles etc.)</label><input class="inp" id="cf_sd" value="${esc(c.skinDetails)}" placeholder="Small scar above left eyebrow"></div></div></div>

<div class="csec"><div class="csec-t">\u{1F487} Hair</div><div class="fr fr4"><div class="fg"><label class="lbl">Style</label><select class="sel" id="cf_hs">${HSTYLES.map(h=>`<option ${c.hairStyle===h?'selected':''}>${h}</option>`).join('')}</select></div><div class="fg"><label class="lbl">Color</label><input class="inp" id="cf_hc" value="${esc(c.hairColor)}" placeholder="Black"></div><div class="fg"><label class="lbl">Length</label><input class="inp" id="cf_hl" value="${esc(c.hairLength)}" placeholder="Medium"></div><div class="fg"><label class="lbl">Features</label><input class="inp" id="cf_hf" value="${esc(c.hairFeatures)}" placeholder="Slight undercut"></div></div></div>

<div class="csec"><div class="csec-t">\u{1F454} Wardrobe</div><div class="fg"><label class="lbl">Default Outfit</label><textarea class="ta" id="cf_outfit" style="min-height:40px" placeholder="Dark navy linen kurta, black slim jeans">${esc(c.outfit)}</textarea></div><div class="fr fr2"><div class="fg"><label class="lbl">Accessories</label><input class="inp" id="cf_acc" value="${esc(c.acc)}" placeholder="Brown leather watch, silver chain"></div><div class="fg"><label class="lbl">Shoes</label><input class="inp" id="cf_shoes" value="${esc(c.shoes)}" placeholder="White sneakers"></div></div></div>

<div class="csec"><div class="csec-t">\u26A0\uFE0F Distinctive Markers (ALWAYS visible in every shot)</div><textarea class="ta" id="cf_markers" style="min-height:40px" placeholder="e.g. Always wears silver chain necklace, Scar above left eyebrow, Red bandana on right wrist">${esc(c.markers)}</textarea></div>

</div><div class="modal-f"><button class="btn bs" onclick="S.modal=null;R()">Cancel</button><button class="btn bp" onclick="saveChar('${c.id}',${isN})">\u{1F4BE} Save Character</button></div></div></div>`}

function renderToasts(){return S.toasts.length?`<div class="toast-c">${S.toasts.map(t=>`<div class="tst tst-${t.t==='success'?'s':t.t==='error'?'e':'i'}">${t.t==='success'?'\u2705':t.t==='error'?'\u274C':'\u{1F4A1}'} ${esc(t.m)}</div>`).join('')}</div>`:''}

function hFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{S.screenplay=ev.target.result;S.spFile=f.name;S.scenes=parseSP(S.screenplay);toast('Loaded: '+f.name+' ('+S.scenes.length+' scenes parsed)','success');R()};r.readAsText(f)}
function hImp(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{impProj(ev.target.result);R()};r.readAsText(f)}

function saveChar(id,isN){const g=k=>document.getElementById('cf_'+k)?.value||'';const n=g('name');if(!n){toast('Character name is required!','error');return}
const c={id,name:n,token:genToken(n),gender:g('gender'),age:g('age'),ethnicity:g('eth'),height:g('ht'),build:g('build'),faceShape:g('fs'),jawline:g('jaw'),cheekbones:g('chk'),eyeShape:g('es'),eyeDetails:'',noseShape:g('ns'),lipShape:g('ls'),facialHair:g('fh'),skinDetails:g('sd'),hairStyle:g('hs'),hairColor:g('hc'),hairLength:g('hl'),hairFeatures:g('hf'),outfit:g('outfit'),acc:g('acc'),shoes:g('shoes'),markers:g('markers'),descPrompt:g('desc')};
if(isN)S.chars.push(c);else{const i=S.chars.findIndex(x=>x.id===id);if(i>=0)S.chars[i]=c}
S.modal=null;toast((isN?'Created':'Updated')+': '+n,'success');R()}

async function testConn(){const pv=PROVIDERS.find(p=>p.id===S.prov);if(!pv)return;const key=S.keys[pv.id];if(!key){toast('Enter API key first','error');return}toast('Testing connection...','info');try{let url=pv.url.replace('{model}',pv.models[0]),h={'Content-Type':'application/json'},b;if(pv.at==='param'){url+='?key='+key;b=JSON.stringify({contents:[{parts:[{text:'Hi'}]}],generationConfig:{maxOutputTokens:5}})}else if(pv.at==='anthropic'){h['x-api-key']=key;h['anthropic-version']='2023-06-01';h['anthropic-dangerous-direct-browser-access']='true';b=JSON.stringify({model:pv.models[0],max_tokens:5,messages:[{role:'user',content:'Hi'}]})}else{h['Authorization']='Bearer '+key;b=JSON.stringify({model:pv.models[0],messages:[{role:'user',content:'Hi'}],max_tokens:5})}const r=await fetch(url,{method:'POST',headers:h,body:b,signal:AbortSignal.timeout(15000)});r.ok?toast('\u2705 Connected to '+pv.name+'!','success'):toast('\u274C Error '+r.status,'error')}catch(e){toast('\u274C '+e.message,'error')}}

let _storageOk=false;
function _testStorage(){try{localStorage.setItem('_test','1');localStorage.removeItem('_test');return true}catch(e){return false}}
function saveToStorage(){const d=JSON.stringify({chars:S.chars,keys:S.keys,prov:S.prov,model:S.model,pname:S.pname,pfmt:S.pfmt,dpace:S.dpace,refp:S.refp,screenplay:S.screenplay,gscenes:S.gscenes,scenes:S.scenes});if(_storageOk){try{localStorage.setItem('cineprompt_v2',d)}catch(e){}}try{document.cookie='cineprompt_v2='+encodeURIComponent(d)+';max-age=31536000;path=/;SameSite=Lax'}catch(e){}}
function loadFromStorage(){let d=null;if(_storageOk){try{d=localStorage.getItem('cineprompt_v2')}catch(e){}}if(!d){try{const c=document.cookie.split(';').find(c=>c.trim().startsWith('cineprompt_v2='));if(c)d=decodeURIComponent(c.split('=').slice(1).join('='))}catch(e){}}if(d){try{const p=JSON.parse(d);if(p.chars&&p.chars.length)S.chars=p.chars;if(p.keys)S.keys=p.keys;if(p.prov)S.prov=p.prov;if(p.model)S.model=p.model;if(p.pname)S.pname=p.pname;if(p.pfmt)S.pfmt=p.pfmt;if(p.dpace)S.dpace=p.dpace;if(p.refp)S.refp=p.refp;if(p.screenplay)S.screenplay=p.screenplay;if(p.gscenes)S.gscenes=p.gscenes;if(p.scenes)S.scenes=p.scenes}catch(e){}}}
_storageOk=_testStorage();
let _saveTimer=null;const _origR=R;R=function(){_origR();clearTimeout(_saveTimer);_saveTimer=setTimeout(saveToStorage,500)};
loadFromStorage();R();
</script>
</body>
</html>
